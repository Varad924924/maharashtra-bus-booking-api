<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up - Bus Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2047080723561705"
     crossorigin="anonymous"></script>
    <div class="auth-container">
        <h2>Bus Booking System</h2>

        <div class="auth-toggle">
            <button id="show-login" class="active" onclick="toggleAuth('login')">Login</button>
            <button id="show-signup" onclick="toggleAuth('signup')">Sign Up</button>
        </div>

        <form id="login-form">
            <h3>Login</h3>
            <input type="email" id="login-email" placeholder="Email Address" required>
            <input type="password" id="login-password" placeholder="Password" required>
            <button type="submit">Login</button>
            <p id="login-error" class="error-message"></p>
        </form>

        <form id="signup-form" style="display: none;">
            <h3>Create an Account</h3>
            <input type="text" id="signup-name" placeholder="Full Name" required>
            <input type="email" id="signup-email" placeholder="Email Address" required>
            <input type="password" id="signup-password" placeholder="Password (Min 8 chars, 1 Upper, 1 Number, 1 Symbol)" required>
            <button type="submit">Sign Up</button>
            <p id="signup-message"></p>
        </form>
    </div>

    <script src="login.js"></script>
</body>
</html>
